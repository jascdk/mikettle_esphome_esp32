# ── Mi Kettle – Pure ESPHome (no external component) ─────────────────────────
#
# This configuration uses BLE advertisement data only.
# No token, no authentication, and no external component are needed.
# The kettle broadcasts its status in BLE advertisement packets on the
# Xiaomi FE95 service, which can be read without pairing.
#
# Replace the placeholders below with values that match your setup:
#   MAC_ADDRESS   – Bluetooth address of your kettle (use BLE scan to find it)
#   WIFI_SSID     – Your Wi-Fi network name
#   WIFI_PASSWORD – Your Wi-Fi password
# ─────────────────────────────────────────────────────────────────────────────

esphome:
  name: mikettle-adv
  friendly_name: Mi Kettle

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "MiKettle Fallback"
    password: "mikettle123"

captive_portal:

# ── Sensors ───────────────────────────────────────────────────────────────────
sensor:
  - platform: template
    name: "Kettle Temperature"
    id: kettle_temp
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0

text_sensor:
  - platform: template
    name: "Kettle Action"
    id: kettle_action

# ── BLE tracker ───────────────────────────────────────────────────────────────
esp32_ble_tracker:
  scan_parameters:
    active: false   # passive scan is sufficient for advertisement-only monitoring

  on_ble_service_data_advertise:
    - mac_address: "AA:BB:CC:DD:EE:FF"   # ← replace with your kettle's MAC
      service_uuid: "FE95"
      then:
        - lambda: |-
            // The Xiaomi FE95 service-data payload for the Mi Kettle places
            // the action byte at index 15 and the temperature byte at index 16.
            if (x.size() < 17) return;
            id(kettle_temp).publish_state(float(x[16]));
            switch (x[15]) {
              case 0x01: id(kettle_action).publish_state("heating");    break;
              case 0x02: id(kettle_action).publish_state("cooling");    break;
              case 0x03: id(kettle_action).publish_state("keep warm");  break;
              default:   id(kettle_action).publish_state("idle");       break;
            }
