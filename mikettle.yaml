# ── Mi Kettle – ESPHome example configuration ─────────────────────────────────
#
# Replace the placeholders below with values that match your setup:
#   MAC_ADDRESS  – Bluetooth address of your kettle (use BLE scan to find it)
#   WIFI_SSID    – Your Wi-Fi network name
#   WIFI_PASSWORD – Your Wi-Fi password
# ─────────────────────────────────────────────────────────────────────────────

esphome:
  name: mikettle
  friendly_name: Mi Kettle

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "MiKettle Fallback"
    password: "mikettle123"

captive_portal:

# ── BLE stack ─────────────────────────────────────────────────────────────────
esp32_ble_tracker:
  scan_parameters:
    active: true

ble_client:
  - mac_address: "AA:BB:CC:DD:EE:FF"   # ← replace with your kettle MAC
    id: mi_kettle_ble

# ── Mi Kettle component ───────────────────────────────────────────────────────
external_components:
  - source:
      type: local
      path: components

mikettle:
  id: my_kettle
  ble_client_id: mi_kettle_ble
  product_id: 275  # 275 = EU version (use 131 for some other variants)

  # Numeric sensors
  current_temperature:
    name: "Kettle Current Temperature"
    id: kettle_current_temp

  set_temperature:
    name: "Kettle Set Temperature"
    id: kettle_set_temp

  keep_warm_time:
    name: "Kettle Keep Warm Time"
    id: kettle_kw_time

  # Text sensors
  action:
    name: "Kettle Action"
    id: kettle_action

  mode:
    name: "Kettle Mode"
    id: kettle_mode

  keep_warm_type:
    name: "Kettle Keep Warm Type"
    id: kettle_kw_type
